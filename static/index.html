<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nova</title>
  <link rel="stylesheet" href="/static/css/style.css?v=2" />
</head>
<body>

  <!-- Click-to-start overlay (browser autoplay policy) -->
  <div id="overlay">
    <div class="overlay-content">
      <div class="overlay-orb"></div>
      <h1>Nova</h1>
      <p>Click anywhere to start</p>
    </div>
  </div>

  <!-- Main layout -->
  <div id="app" class="hidden">
    <header>
      <h1>Nova</h1>
      <span id="tone-label" class="tone-label">neutral</span>
      <button id="clear-btn" title="Clear history">Clear</button>
      <button id="screen-btn" title="Share screen">
        <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M21 2H3c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h7v2H8v2h8v-2h-2v-2h7c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H3V4h18v12z"/></svg>
      </button>
    </header>

    <div id="avatar-container">
      <canvas id="avatar-canvas"></canvas>
      <div id="visual-panel">
        <div id="visual-panel-header">
          <span>Visual State</span>
          <button id="visual-toggle" title="Toggle visual log">&#9660;</button>
        </div>
        <div id="visual-log"></div>
      </div>
    </div>

    <div id="chat-panel">
      <div id="chat-messages"></div>
    </div>

    <div id="image-preview-bar" class="hidden"></div>
    <div id="input-bar">
      <input type="file" id="file-input" accept="image/*" multiple style="display:none" />
      <button id="attach-btn" title="Attach image">
        <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>
      </button>
      <input type="text" id="text-input" placeholder="Type a message..." autocomplete="off" />
      <button id="send-btn" title="Send">
        <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
      <button id="ptt-btn" title="Hold to talk (or hold spacebar)">
        <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
      </button>
    </div>

    <div id="status-bar">
      <span id="connection-status">Connecting...</span>
    </div>
  </div>

  <!-- Three.js from CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="/static/js/avatar.js?v=8"></script>
  <script src="/static/js/app.js?v=4"></script>
</body>
</html>
